<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="60%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD6E7"/>
      <stop offset="100%" stop-color="#FFC8DD"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="13" fill="url(#bgGrad)"/>

  <!-- Chat bubble body (faint) -->
  <path d="M8 9 Q8 5 12 5 H36 Q40 5 40 9 V27 Q40 31 36 31 H26 L20 40 L20 31 H12 Q8 31 8 27 Z"
        fill="url(#bubbleGrad)" opacity="0.55"/>

  <!-- Left eye -->
  <ellipse cx="18" cy="14" rx="2.8" ry="3" fill="#1F2937"/>
  <circle cx="19.1" cy="12.9" r="1" fill="white" opacity="0.9"/>

  <!-- Right eye -->
  <ellipse cx="30" cy="14" rx="2.8" ry="3" fill="#1F2937"/>
  <circle cx="31.1" cy="12.9" r="1" fill="white" opacity="0.9"/>

  <!-- Cute 4-point star (smooth curved kawaii style) -->
  <g transform="translate(24, 19)">
    <!-- Soft 4-pointed star via bezier curves -->
    <path d="M 0,-9 C 1.5,-3 3,-1.5 9,0 C 3,1.5 1.5,3 0,9 C -1.5,3 -3,1.5 -9,0 C -3,-1.5 -1.5,-3 0,-9 Z"
          fill="white" opacity="0.35"/>
    <!-- Tiny inner glow center -->  
    <circle cx="0" cy="0" r="2.2" fill="white" opacity="0.5"/>
    <!-- 4 tiny dot accents at tips -->
    <circle cx="0" cy="-9" r="1" fill="white" opacity="0.6"/>
    <circle cx="9" cy="0" r="1" fill="white" opacity="0.6"/>
    <circle cx="0" cy="9" r="1" fill="white" opacity="0.6"/>
    <circle cx="-9" cy="0" r="1" fill="white" opacity="0.6"/>
  </g>

  <!-- Cute small centered smile -->
  <path d="M20 24 Q24 27.5 28 24" stroke="#1F2937" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Small accent dot -->
  <circle cx="35" cy="11" r="1" fill="white" opacity="0.45"/>
</svg>